<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MPAY AEPS Services</title>

<style>
/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: radial-gradient(circle, #1a1a1a, #000000);
    color: white;
}

/* HEADER */
header {
    background: black;
    padding: 15px;
    text-align: center;
}

.logo {
    width: 180px;
    filter: drop-shadow(0 0 10px gold);
}

header h1 {
    color: gold;
    margin-top: 10px;
}

/* CONTAINER */
.container {
    width: 90%;
    margin: auto;
}

/* CARD */
.card {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin-top: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

/* CEO IMAGE */
.ceo-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid gold;
    box-shadow: 0 0 15px gold;
    margin-right: 20px;
}

/* BUTTON */
.btn {
    padding: 10px 18px;
    background: linear-gradient(45deg, gold, orange);
    color: black;
    border-radius: 25px;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    font-weight: bold;
}

.btn.call {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

.btn:hover {
    transform: scale(1.1);
}

/* FORM */
.form-box {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin-top: 20px;
    border-radius: 20px;
    text-align: center;
}

input, textarea {
    padding: 10px;
    margin: 5px;
    width: 80%;
    border-radius: 10px;
    border: none;
}

/* EMPLOYEE */
#employeeSection {
    display: none;
}

.employee-card {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.employee-card:hover {
    transform: scale(1.03);
}

.employee-card img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-right: 15px;
    border: 2px solid gold;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
    <img src="https://raw.githubusercontent.com/Juber339/munitindia.in/main/logo.png" class="logo">
    <h1>MPAY AEPS MATM Services</h1>
</header>

<div class="container">

<!-- CEO -->
<div class="card">
    <img src="https://raw.githubusercontent.com/Juber339/munitindia.in/main/juber%20photo.png" class="ceo-img">
    <div>
        <h2>Zuber (CEO)</h2>
        <p>AEPS MATM Provider</p>
        <p>📞 9992003242</p>

        <a href="https://wa.me/919992003242" class="btn">WhatsApp</a>
        <a href="tel:9992003242" class="btn call">Call</a>
    </div>
</div>

<!-- EMPLOYEE BUTTON -->
<div class="form-box">
    <h2>Our Team</h2>
    <button class="btn" onclick="toggleEmployees()">View Employees</button>
</div>

<!-- EMPLOYEE LIST -->
<div id="employeeSection">

    <!-- MOHD BILAL -->
    <div class="employee-card">
        <img src="https://raw.githubusercontent.com/Juber339/munitindia.in/main/Bilal%20Mpay.jpeg">
        <div>
            <h3>MOHD BILAL</h3>
            <p>📞 9813490892</p>

            <a href="https://wa.me/919813490892" class="btn">WhatsApp</a>
            <a href="tel:9813490892" class="btn call">Call</a>
        </div>
    </div>

</div>

<!-- ENQUIRY -->
<div class="form-box">
    <h2>Customer Enquiry</h2>

    <input type="text" id="name" placeholder="Name"><br>
    <input type="text" id="phone" placeholder="Mobile"><br>
    <textarea id="msg" placeholder="Message"></textarea><br>

    <button class="btn" onclick="sendData()">Submit</button>
</div>

</div>

<script>
function toggleEmployees() {
    let section = document.getElementById("employeeSection");
    section.style.display = (section.style.display === "block") ? "none" : "block";
}

function sendData() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("msg").value;

    let text = name + " | " + phone + " | " + msg;

    alert("Enquiry Submitted!");

    window.open("https://wa.me/919992003242?text=" + text);
}
</script>

</body>
</html>
